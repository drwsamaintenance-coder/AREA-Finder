<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Directory Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>Resident Accounts Directory</h1>
                <p>Lookup account details, street addresses, blocks, and lots.</p>
            </div>
           <button class="btn-primary" id="openModal">
    <span>+</span> Add New Consumer
</button>
        </header>

      <div class="dashboard-bar">

    <select id="addressFilter">
        <option value="">All Addresses</option>
    </select>

    <input type="text"
           id="searchInput"
           placeholder="Search by name, account, address, block, or lot...">

    <span id="addressCount" class="consumer-count">
        Total Consumers: 0
    </span>

</div>

        <div class="card-container">
            <table>
                <thead><tr><th>Account No.</th><th>Name</th><th>Address</th><th>Block</th><th>Lot</th><th>Action</th></tr></thead>
                <tbody id="directoryTable"></tbody>
            </table>
            <div id="noResults" class="no-results" style="display:none;">No records found.</div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2 id="modalTitle">Add New Resident</h2>
            <form id="addForm">
                <input type="text" id="accNum" required placeholder="Account Number">
                <input type="text" id="fullName" required placeholder="Full Name">
                <input type="text" id="address" required placeholder="Street Address">
                <div class="form-row"><input type="text" id="block" required placeholder="Block"><input type="text" id="lot" required placeholder="Lot"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="closeModal">Cancel</button>
                    <button type="submit" class="btn-save">Save Record</button>
                </div>
            </form>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
