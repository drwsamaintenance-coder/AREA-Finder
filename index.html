
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Directory Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #475569;
            --danger-color: #f43f5e;
            --radius-lg: 16px;
            --radius-md: 8px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
.btn-delete{
    background:#f43f5e;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}

.btn-delete:hover{
    background:#be123c;
}
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
.btn-edit{
    background:#38bdf8;
    color:#0f172a;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    margin-right:6px;
    font-weight:600;
}

.btn-edit:hover{
    background:#0284c7;
    color:white;
}
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        /* Header */
        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-title p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .btn-add {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Search Bar Section */
        .search-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-secondary);
            width: 20px;
            height: 20px;
        }

        /* Table Card Container */
        .card-container {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.25rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
            font-size: 0.95rem;
        }

        tbody tr {
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 1.25rem;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.6rem 1rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Title Header -->
        <header>
            <div class="header-title">
                <h1>Resident Accounts Directory</h1>
                <p>Lookup account details, street addresses, blocks, and lots.</p>
            </div>
            <button class="btn-add" onclick="toggleModal(true)">
                <span>+</span> Add New Record
            </button>
        </header>

        <!-- Address Filter -->
<div class="filter-area">

    <select id="addressFilter" onchange="filterByAddress()">
        <option value="">All Addresses</option>
    </select>

    <span id="addressCount">
        Total Consumers: 0
    </span>

</div>


<!-- Search Bar -->
<div class="search-wrapper">

    <svg class="search-icon" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>

    <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Search by name, account number, address, block, or lot..." 
        onkeyup="filterDirectory()"
    >

</div>
        <!-- Table Display Container -->
        <div class="card-container">
            <table>
               <thead>
    <tr>
        <th>Account No.</th>
        <th>Full Name</th>
        <th>Street Address</th>
        <th>Block</th>
        <th>Lot</th>
        <th>Action</th>
    </tr>
</thead>
                <tbody id="directoryTable">
                    <!-- Data populates automatically from JavaScript -->
                </tbody>
            </table>
            <div id="noResults" class="no-results" style="display: none;">
                No records found matching your search term.
            </div>
        </div>
    </div>

    <!-- Modal Form for Adding New Records -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2>Add New Resident</h2>
            <form id="addForm" onsubmit="saveRecord(event)">
                <div class="form-group">
                    <label>Account Number</label>
                    <input type="text" id="accNum" required placeholder="e.g. ACC-1004">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" id="address" required placeholder="e.g. Maple Drive">
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>Block</label>
                        <input type="text" id="block" required placeholder="e.g. 5">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Lot</label>
                        <input type="text" id="lot" required placeholder="e.g. 12">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
                    <button type="submit" class="btn-save">Save Record</button>
                </div>
            </form>
        </div>
    </div>

        // Address Filter
function loadAddressFilter(){

    const addressSelect = document.getElementById("addressFilter");

    // clear old options
    addressSelect.innerHTML = `
        <option value="">All Addresses</option>
    `;

    let addresses = [...new Set(records.map(item => item.address))];

    addresses.forEach(address => {

        let option = document.createElement("option");

        option.value = address;
        option.textContent = address;

        addressSelect.appendChild(option);

    });

}


// Filter by Address + Count
function filterByAddress(){

    const selectedAddress = document.getElementById("addressFilter").value;

    let filteredData;


    if(selectedAddress === ""){

        filteredData = records;

    } else {

        filteredData = records.filter(item =>
            item.address === selectedAddress
        );

    }


    renderTable(filteredData);


    document.getElementById("addressCount").innerHTML =
        "Total Consumers: " + filteredData.length;

}



// Render table records on startup
function renderTable(dataToDisplay) {

    const tableBody = document.getElementById('directoryTable');
    const noResults = document.getElementById('noResults');

    tableBody.innerHTML = '';


    if (dataToDisplay.length === 0) {

        noResults.style.display = 'block';
        return;

    } else {

        noResults.style.display = 'none';

    }


    dataToDisplay.forEach(item => {

        const row = document.createElement('tr');

        row.innerHTML = `
        <td><span class="badge">${item.acc}</span></td>

        <td style="font-weight:600;">
            ${item.name}
        </td>

        <td>
            ${item.address}
        </td>

        <td>
            Block ${item.block}
        </td>

        <td>
            Lot ${item.lot}
        </td>

        <td>

            <button class="btn-edit" onclick="editRecord('${item.acc}')">
                Edit
            </button>

            <button class="btn-delete" onclick="deleteRecord('${item.acc}')">
                Delete
            </button>

        </td>
        `;

        tableBody.appendChild(row);

    });

}
